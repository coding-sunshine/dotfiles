# Starship prompt (~/.config/starship.toml)
# Docs: https://starship.rs/config/

add_newline = true
command_timeout = 1000
palette = "gruvbox"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs$bun$php$python$golang$rust$docker_context\
$cmd_duration\
$line_break\
$jobs$character"""

right_format = "$time"

# Gruvbox palette to match the Ghostty "GruvboxDark" theme
[palettes.gruvbox]
fg     = "#ebdbb2"
red    = "#fb4934"
green  = "#b8bb26"
yellow = "#fabd2f"
blue   = "#83a598"
purple = "#d3869b"
aqua   = "#8ec07c"
orange = "#fe8019"
gray   = "#928374"

[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)[@]($style)"
show_always = false   # only shown over SSH / as root

[hostname]
ssh_only = true
style = "bold orange"
format = "[$hostname]($style) "

[fill]
symbol = " "

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold aqua"
read_only = " "
read_only_style = "red"

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[·](bold yellow)"

[git_branch]
symbol = " "
style = "bold purple"

[git_state]
style = "bold red"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[cmd_duration]
min_time = 2000
style = "bold gray"
format = "[ $duration]($style) "

[time]
disabled = false
style = "bold gray"
format = "[ $time]($style)"
time_format = "%H:%M"

[jobs]
symbol = " "
style = "bold blue"

[php]
symbol = " "
style = "blue"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "yellow"
format = "[$symbol($version )]($style)"

[bun]
symbol = "🥟 "
style = "yellow"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "aqua"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "orange"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "blue"
format = "[$symbol$context]($style) "
